name: Deploy FastAPI to Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "app,deploy,requirements.txt"
          target: "/var/www/hyre-me/api"
          overwrite: true
          strip_components: 0

      - name: Install dependencies and restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd /var/www/hyre-me/api
            /var/www/hyre-me/api/.venv/bin/pip install -r requirements.txt
            mkdir -p ~/.config/systemd/user
            cp /var/www/hyre-me/api/deploy/systemd/hyre-me-api.service ~/.config/systemd/user/hyre-me-api.service
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            systemctl --user daemon-reload
            systemctl --user enable hyre-me-api
            systemctl --user restart hyre-me-api
            systemctl --user status hyre-me-api --no-pager
